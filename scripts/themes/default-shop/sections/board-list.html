<!-- default-shop / board-list.html -->
<style>
.ds-board {
  background: {{board_bg | default: '#ffffff'}};
  padding: 48px 0 80px;
  font-family: var(--ds-font, 'Pretendard', sans-serif);
  min-height: 60vh;
}
.ds-board-inner {
  max-width: var(--ds-max-width, 1280px);
  margin: 0 auto;
  padding: 0 24px;
}
.ds-board-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.ds-board-title {
  font-size: clamp(20px, 3vw, 26px);
  font-weight: 800;
  color: #0f172a;
  margin: 0;
  font-family: var(--ds-font-heading, inherit);
}
.ds-board-write-btn {
  padding: 9px 20px;
  background: var(--ds-primary, #1a56db);
  color: #fff;
  border: none;
  border-radius: var(--ds-btn-radius, 8px);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.ds-board-tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid #e2e8f0;
  margin-bottom: 0;
}
.ds-board-tab {
  padding: 11px 20px;
  font-size: 14px;
  font-weight: 600;
  color: #64748b;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.ds-board-tab:hover { color: #1e293b; }
.ds-board-tab.active { color: var(--ds-primary, #1a56db); border-bottom-color: var(--ds-primary, #1a56db); }
.ds-board-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 2px;
}
.ds-board-table thead th {
  padding: 12px 16px;
  text-align: left;
  font-size: 12px;
  font-weight: 700;
  color: #64748b;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  white-space: nowrap;
}
.ds-board-table thead th:first-child { width: 60px; text-align: center; border-radius: 8px 0 0 0; }
.ds-board-table thead th:last-child { border-radius: 0 8px 0 0; }
.ds-board-table tbody tr {
  border-bottom: 1px solid #f1f5f9;
  transition: background .15s;
}
.ds-board-table tbody tr:hover { background: #f8fafc; }
.ds-board-table tbody td {
  padding: 14px 16px;
  font-size: 14px;
  color: #374151;
  vertical-align: middle;
}
.ds-board-num { text-align: center; font-size: 13px; color: #94a3b8; }
.ds-board-subject a {
  color: #1e293b;
  text-decoration: none;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ds-board-subject a:hover { color: var(--ds-primary, #1a56db); }
.ds-board-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  background: rgba(37,99,235,.1);
  color: var(--ds-primary, #1a56db);
  white-space: nowrap;
}
.ds-board-badge.notice { background: rgba(239,68,68,.1); color: #ef4444; }
.ds-board-author { font-size: 13px; color: #64748b; white-space: nowrap; }
.ds-board-date { font-size: 12px; color: #94a3b8; white-space: nowrap; }
.ds-board-views { font-size: 12px; color: #94a3b8; text-align: right; white-space: nowrap; }
.ds-board-search {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  justify-content: center;
}
.ds-board-search select, .ds-board-search input {
  padding: 9px 14px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 13px;
  color: #374151;
  outline: none;
  background: #fff;
}
.ds-board-search input:focus { border-color: var(--ds-primary, #1a56db); }
.ds-board-search button {
  padding: 9px 20px;
  background: var(--ds-primary, #1a56db);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.ds-board-pagination {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 24px;
}
.ds-board-page-btn {
  width: 34px; height: 34px;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
  background: #fff;
  font-size: 13px;
  font-weight: 500;
  color: #64748b;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.ds-board-page-btn:hover, .ds-board-page-btn.active {
  background: var(--ds-primary, #1a56db);
  border-color: var(--ds-primary, #1a56db);
  color: #fff;
}
</style>

<section class="ms-board">
  <div class="ms-board-inner">
    <div class="ms-board-top">
      <h1 class="ms-board-title">{{board_title | default: '커뮤니티'}}</h1>
      <a href="{{board_write_url | default: '/board/write'}}" class="ms-board-write-btn">
        ✏️ {{board_write_text | default: '글쓰기'}}
      </a>
    </div>
    <div class="ms-board-tabs">
      <div class="ms-board-tab active">전체</div>
      <div class="ms-board-tab">공지</div>
      <div class="ms-board-tab">자유게시판</div>
      <div class="ms-board-tab">Q&A</div>
      <div class="ms-board-tab">후기</div>
    </div>
    <table class="ms-board-table">
      <thead>
        <tr>
          <th>번호</th>
          <th>제목</th>
          <th>작성자</th>
          <th>날짜</th>
          <th style="text-align:right">조회</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="ms-board-num"><span class="ms-board-badge notice">공지</span></td>
          <td class="ms-board-subject"><a href="#">이벤트 안내 및 공지사항</a></td>
          <td class="ms-board-author">운영자</td>
          <td class="ms-board-date">2025.04.01</td>
          <td class="ms-board-views">1,234</td>
        </tr>
        <tr>
          <td class="ms-board-num">128</td>
          <td class="ms-board-subject"><a href="#">구매 후기 올립니다 <span class="ms-board-badge">후기</span></a></td>
          <td class="ms-board-author">김*수</td>
          <td class="ms-board-date">2025.04.09</td>
          <td class="ms-board-views">87</td>
        </tr>
        <tr>
          <td class="ms-board-num">127</td>
          <td class="ms-board-subject"><a href="#">배송 관련 문의 <span class="ms-board-badge">Q&A</span></a></td>
          <td class="ms-board-author">이*진</td>
          <td class="ms-board-date">2025.04.08</td>
          <td class="ms-board-views">42</td>
        </tr>
        <tr>
          <td class="ms-board-num">126</td>
          <td class="ms-board-subject"><a href="#">봄맞이 코디 추천해주세요!</a></td>
          <td class="ms-board-author">박*영</td>
          <td class="ms-board-date">2025.04.07</td>
          <td class="ms-board-views">156</td>
        </tr>
        <tr>
          <td class="ms-board-num">125</td>
          <td class="ms-board-subject"><a href="#">사이즈 문의드립니다 <span class="ms-board-badge">Q&A</span></a></td>
          <td class="ms-board-author">최*민</td>
          <td class="ms-board-date">2025.04.06</td>
          <td class="ms-board-views">33</td>
        </tr>
      </tbody>
    </table>
    <div class="ms-board-search">
      <select><option>제목+내용</option><option>제목</option><option>작성자</option></select>
      <input type="text" placeholder="{{board_search_placeholder | default: '검색어 입력'}}" />
      <button>검색</button>
    </div>
    <div class="ms-board-pagination">
      <button class="ms-board-page-btn">‹</button>
      <button class="ms-board-page-btn active">1</button>
      <button class="ms-board-page-btn">2</button>
      <button class="ms-board-page-btn">3</button>
      <button class="ms-board-page-btn">›</button>
    </div>
  </div>
</section>
